<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rudraksh's App</title>
  <link rel="stylesheet" href="../shared/app.css">
</head>
<body class="page">
  <h1 class="page-title">Rudraksh's App</h1>
  <main class="page-content">
    <div class="phone-shell">
      <div class="phone" style="--app-bg: #d0f7ff;">
        <div class="notch"></div>
        <div class="screen">
          <div class="app" data-app data-initial-screen="Screen1">
            <section class="screen-panel" data-screen="Screen1">
              <div class="table" style="grid-template-columns: repeat(4, 1fr);">
                <img class="ai-image" src="../assets/rudrakshSA/vidyalogo.png" alt="Vidya logo" style="grid-column: 1;">
                <img class="ai-image" src="../assets/rudrakshSA/un.jpeg" alt="UN" style="grid-column: 2;">
              </div>

              <p class="ai-label" style="background: #860d0d; color: #ffffff; font-size: 18px; padding: 6px 10px;">DECENT WORK &amp; ECONOMIC GROWTH</p>

              <div class="table" style="grid-template-columns: 1fr; grid-template-rows: repeat(7, auto);">
                <button class="ai-button" style="grid-row: 1; font-size: 18px;" data-speak="Approximately 23% globally">What is the global gender pay gap?</button>
                <button class="ai-button" style="grid-row: 3; font-size: 18px;" data-speak="Job creation, rights at work, social protection, and social dialogue">What are the &quot;four pillars&quot; of decent work?</button>
                <button class="ai-button" style="grid-row: 5; font-size: 18px;" data-speak="It typically includes fair income, security in the workplace, social protection for families, and freedom for people to express their concerns.">What constitutes &quot;decent work&quot;?</button>
                <button class="ai-button" style="grid-row: 7; font-size: 18px;" data-speak=" Informal workers often lack labor rights, social protection, and stable wages.">Impact of Technology?</button>
              </div>

              <button class="ai-button" data-go="Screen2">NEXT~</button>
              <p class="ai-label">CREATED BY~ RUDRAKSHA DHALLA</p>
            </section>

            <section class="screen-panel" data-screen="Screen2" hidden>
              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/rudrakshSA/vidyalogo.png" alt="Vidya logo">
                <img class="ai-image" src="../assets/rudrakshSA/un.jpeg" alt="UN">
              </div>

              <div class="table" style="grid-template-columns: 1fr; grid-template-rows: repeat(10, auto);">
                <p class="ai-label" style="grid-row: 1; font-size: 18px;">how do it implement in our life ?</p>
                <button class="ai-button shape-round" style="grid-row: 2;" data-speak="UN Global Goal 8, Decent Work and Economic Growth, fundamentally impacts our lives by shifting the focus from simple financial gain to the quality and dignity of work. By advocating for fair wages, safe working environments, and the protection of labour rights, this goal ensures that employment is a path out of poverty rather than a source of exploitation. For individuals, this translates into increased financial resilience, allowing families to manage income shocks and invest in their future through better education and healthcare. It specifically targets vulnerable groups—such as youth, women, and persons with disabilities—by promoting inclusive hiring practices and striving to close the gender pay gap.  On a broader societal level, Goal 8 drives technological innovation and supports small-to-medium enterprises (SMEs), which are the backbone of most economies. This fosters a more stable and diverse job market, reducing youth unemployment and the number of people in precarious informal work. Furthermore, it encourages a “green economy” by attempting to decouple economic growth from environmental degradation. By promoting sustainable tourism and resource efficiency, the goal aims to create long-term prosperity that does not compromise the planet's health. Ultimately, Goal 8 reimagines the global economy as a tool for social justice, ensuring that as the world grows wealthier, the benefits are shared equitably, leading to a higher standard of living and more resilient communities worldwide. ">THE ANSWER</button>
                <p class="ai-label" style="grid-row: 10; color: #ffffff;">CREATED BY~ RUDRAKSHA DHALLA</p>
              </div>

              <button class="ai-button" data-go="Screen1">~BACK</button>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../shared/app.js"></script>
</body>
</html>
