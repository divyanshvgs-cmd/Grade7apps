<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nisha's App</title>
  <link rel="stylesheet" href="../shared/app.css">
</head>
<body class="page">
  <h1 class="page-title">Nisha's App</h1>
  <main class="page-content">
    <div class="phone-shell">
      <div class="phone" style="--app-bg: #deeaf1;">
        <div class="notch"></div>
        <div class="screen">
          <div class="app" data-app data-initial-screen="Screen1">
            <section class="screen-panel" data-screen="Screen1">
              <p class="ai-label font-sans" style="font-size: 40px; font-weight: 700;">Indian Dance Forms</p>
              <div class="table dance-grid dance-grid-top" style="grid-template-columns: repeat(2, 1fr);">
                <button class="ai-button" style="background: #d2c7e5;" data-speak="Bharatanatyam originated in Tamil Nadu and is one of India’s oldest classical dances. It was traditionally performed in temples as a form of devotion. The dance emphasizes strong footwork, geometric body positions, and expressive storytelling through mudras and facial expressions. Costumes include a silk saree, temple jewelry, and ankle bells (ghungroos). Themes often come from epics like the Ramayana and Mahabharata.">Bharatanatyam</button>
                <img class="ai-image dance-image" src="../assets/nishaFA/Bharatanatyam_Dance_2250x.webp" alt="Bharatanatyam">

                <button class="ai-button" style="background: #d2c7e5;" data-speak="Kathak began in North India and evolved from storytelling by traveling bards called kathakars. It is famous for intricate footwork, rapid spins (chakkars), and rhythmic patterns. Kathak performances highlight both dance and dramatic expression. Costumes vary from traditional lehenga/choli to Mughal-inspired outfits. The dance blends Hindu and Persian cultural influences.">Kathak</button>
                <img class="ai-image dance-image" src="../assets/nishaFA/KATHAK.jpg" alt="Kathak">

                <button class="ai-button" style="background: #d2c7e5;" data-speak="Kuchipudi is a major Indian classical dance-drama originating from Andhra Pradesh, characterized by a fast-paced blend of Nritta (pure dance), Nritya (expression), and Natya (drama). Rooted in the Natya Shastra, it features intricate footwork, graceful movements, and, famously, dancing on the edge of a brass plate (Tarangam). ">&nbsp;Kuchipudi</button>
                <img class="ai-image dance-image" src="../assets/nishaFA/KUCHIPUDI.jpg" alt="Kuchipudi">

                <button class="ai-button" style="background: #d2c7e5;" data-speak="Manipuri dance is a major Indian classical dance form from Manipur, renowned for its graceful, fluid movements and devotional themes, particularly the Raslila depicting the love between Radha and Krishna. Rooted in ancient, pre-Vaishnavite traditions like Lai Haraoba, it features colorful, distinct costumes (cylindrical skirts for women) and subtle,,,unbroken motions. ">Manipuri</button>
                <img class="ai-image dance-image" src="../assets/nishaFA/mandance2.jpg" alt="Manipuri">
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../shared/app.js"></script>
</body>
</html>
