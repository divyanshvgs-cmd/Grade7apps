<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rudraksh's App</title>
  <link rel="stylesheet" href="../shared/app.css">
</head>
<body class="page">
  <h1 class="page-title">Rudraksh's App</h1>
  <main class="page-content">
    <div class="phone-shell">
      <div class="phone" style="--app-bg: #deeaf1;">
        <div class="notch"></div>
        <div class="screen">
          <div class="app" data-app data-initial-screen="Screen1">
            <section class="screen-panel" data-screen="Screen1">
              <button class="ai-button">&nbsp;PRIMARY COLORS</button>
              <button class="ai-button shape-round" style="background: #ff0000; color: #ffffff;" data-speak="Primary red is a fundamental, non-mixed color that serves as a cornerstone in both traditional art (RYB model: Red, Yellow, Blue) and modern light-based technology (RGB model: Red, Green, Blue). It sits between orange and purple, with a wavelength of 625–740 nm, representing energy, danger, and attention. ">R E D</button>
              <button class="ai-button shape-round" style="background: #0000ff; color: #ffffff;" data-speak="Primary blue is a foundational, non-mixture color ( ) found in both traditional painting (RYB) and digital (RGB) models, sitting between violet and cyan at 450-495 nm. It symbolizes calmness, trust, and authority, while being perceived as a cool, receding color.">B L U E</button>
              <button class="ai-button shape-round" style="background: #ffff00; color: #000000;" data-speak="Primary yellow is a fundamental, highly luminous color (wavelength 575–585 nm) that cannot be created by mixing other pigments.">Y E L L O W</button>
              <button class="ai-button">SECONDRY COLORS</button>

              <div class="table" style="grid-template-columns: repeat(5, 1fr);">
                <p class="ai-label" style="grid-column: 1; grid-row: 1;">Red</p>
                <p class="ai-label" style="grid-column: 2; grid-row: 1;">+</p>
                <p class="ai-label" style="grid-column: 3; grid-row: 1;">Blue</p>
                <p class="ai-label" style="grid-column: 4; grid-row: 1;">=</p>
                <button class="ai-button shape-round" style="grid-column: 5; grid-row: 1; background: #3f018e; color: #ffffff;" data-speak="Purple is a versatile, cool-toned, secondary color—a mix of red and blue—symbolizing royalty, luxury, wisdom, and creativity. Historically rare and expensive (derived from sea snails), it has long represented power and nobility. It spans over 200 shades, from deep violet to light lavender, affecting moods with both calming and stimulating properties.">P U R P L E</button>

                <p class="ai-label" style="grid-column: 1; grid-row: 2;">Blue</p>
                <p class="ai-label" style="grid-column: 2; grid-row: 2;">+</p>
                <p class="ai-label" style="grid-column: 3; grid-row: 2;">Yellow</p>
                <p class="ai-label" style="grid-column: 4; grid-row: 2;">=</p>
                <button class="ai-button shape-round" style="grid-column: 5; grid-row: 2; background: #00ff00; color: #000000;" data-speak="Green, located in the middle of the visible spectrum ( ), represents nature, growth, renewal, and harmony. It is the color of chlorophyll in plants, symbolizing life, freshness, and stability, while also denoting wealth, safety, and, in some contexts, envy. Green is a highly restful, calming, and soothing color for the human eye. ">G R E E N</button>

                <p class="ai-label" style="grid-column: 1; grid-row: 3;">Red</p>
                <p class="ai-label" style="grid-column: 2; grid-row: 3;">+</p>
                <p class="ai-label" style="grid-column: 3; grid-row: 3;">Yellow</p>
                <p class="ai-label" style="grid-column: 4; grid-row: 3;">=</p>
                <button class="ai-button shape-round" style="grid-column: 5; grid-row: 3; background: #ffc800; color: #000000;" data-speak="Orange is a vibrant, warm color located between red and yellow in the visible light spectrum (roughly 585–620 nm). It is a secondary color associated with energy, creativity, enthusiasm, and health. Named after the citrus fruit, it signifies warmth, autumn, and safety. It is highly visible, making it ideal for safety gear, and carries deep spiritual meaning in Hinduism and Buddhism">O R A N G E</button>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../shared/app.js"></script>
</body>
</html>
