<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prisha's App</title>
  <link rel="stylesheet" href="../shared/app.css">
</head>
<body class="page">
  <h1 class="page-title">Prisha's App</h1>
  <main class="page-content">
    <div class="phone-shell">
      <div class="phone" style="--app-bg: #dceaf0;">
        <div class="notch"></div>
        <div class="screen">
          <div class="app" data-app data-initial-screen="Screen1">
            <section class="screen-panel" data-screen="Screen1">
              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/prishaSA/Goal_14.png" alt="Goal 14">
                <img class="ai-image" src="../assets/prishaSA/logo.png" alt="Logo">
              </div>

              <p class="ai-label text-center" style="font-size: 25px; font-weight: 700; font-style: italic;">&nbsp;UN Goal 14- Life Below Water</p>

              <button class="ai-button" data-speak="UN Sustainable Development Goal 14&quot;Life Below Water&quot; aims to conserve and sustainably use the world’s oceans, seas, and marine resources. It focuses on reducing marine pollution, ending overfishing, addressing ocean acidification, and protecting marine ecosystems to ensure they continue to support biodiversity and human livelihoods.">About life below water</button>

              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/prishaSA/14.jpg" alt="Goal 14 image" style="grid-column: 1; grid-row: 1;">
                <img class="ai-image" src="../assets/prishaSA/WATER.avif" alt="Water" style="grid-column: 2; grid-row: 1;">
                <img class="ai-image" src="../assets/prishaSA/turtle.jpg" alt="Turtle" style="grid-column: 1; grid-row: 2;">
                <button class="ai-button" style="grid-column: 2; grid-row: 2;" data-speak="Key Targets for 2030 SDG 14 aims to address critical threats through 10 targets, including:  Pollution Control: Reducing marine pollution, particularly land-based plastic and nutrient waste. Ecosystem Protection: Restoring coastal ecosystems and reducing ocean acidification. Sustainable Fishing &amp; Conservation: Ending overfishing and destructive practices, while increasing protected marine areas. Economic Support: Prohibiting harmful fisheries subsidies and supporting small-scale fishers.">Key Targets</button>
                <button class="ai-button" style="grid-column: 2; grid-row: 3;" data-go="Screen2">Next</button>
              </div>
            </section>

            <section class="screen-panel" data-screen="Screen2" hidden>
              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/prishaSA/Goal_14.png" alt="Goal 14">
                <img class="ai-image" src="../assets/prishaSA/logo.png" alt="Logo">
              </div>

              <p class="ai-label" style="font-size: 25px; font-weight: 700; font-style: italic;">Causes and How to help-</p>

              <div class="table" style="grid-template-columns: 1fr;">
                <img class="ai-image" src="../assets/prishaSA/ocean.jpg" alt="Ocean" style="grid-column: 1; grid-row: 1;">
                <button class="ai-button" style="grid-column: 1; grid-row: 2;" data-speak="UN Sustainable Development Goal 14 (Life Below Water) aims to address the critical decline of marine ecosystems caused primarily by human activities. The major drivers of this deterioration include pollution, climate change, overfishing, and habitat destruction.">Causes of harm to life below water</button>
              </div>

              <div class="table" style="grid-template-columns: repeat(4, 1fr);">
                <button class="ai-button" style="grid-column: 1; grid-row: 1;" data-speak="To support UN Sustainable Development Goal 14 (Life Below Water), you can reduce marine pollution by minimizing single-use plastics and choosing sustainable, ocean-friendly products. Additionally, advocate for conservation, support organizations protecting marine ecosystems, and make informed, sustainable seafood choices to combat overfishing.">What to do to help?</button>
                <p class="ai-label" style="grid-column: 1; grid-row: 2; font-weight: 700; font-style: italic;">App created by- Prisha</p>
                <button class="ai-button" style="grid-column: 4; grid-row: 2;" data-go="Screen1">Back</button>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../shared/app.js"></script>
</body>
</html>
