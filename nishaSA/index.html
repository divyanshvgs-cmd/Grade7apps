<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Nisha's App</title>
  <link rel="stylesheet" href="../shared/app.css">
</head>
<body class="page">
  <h1 class="page-title">Nisha's App</h1>
  <main class="page-content">
    <div class="phone-shell">
      <div class="phone" style="--app-bg: #76d59e;">
        <div class="notch"></div>
        <div class="screen">
          <div class="app" data-app data-initial-screen="Screen1">
            <section class="screen-panel" data-screen="Screen1">
              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/nishaSA/Sustainable_Development_Goal_13Climate.svg.png" alt="Goal 13">
                <img class="ai-image" src="../assets/nishaSA/school.png" alt="School">
              </div>

              <p class="ai-label font-sans" style="font-size: 25px; font-weight: 700; font-style: italic;">UN Global Goal 13- CLIMATE ACTIONS</p>

              <button class="ai-button" style="background: #3a969f; color: #000000; font-size: 20px;" data-speak=" It is the 13th UN global goal and it calls for urgent, immediate action to combat climate change and its devastating impacts, aiming to limit global temperature rise to well below 2°C, preferably to 1.5°C, compared to pre-industrial levels. It focuses on strengthening resilience to climate-related hazards, integrating climate measures into national policies, improving education, and raising capacity for climate planning, particularly in developing nations.">About Climate Actions</button>

              <div class="table" style="grid-template-columns: repeat(3, 1fr);">
                <img class="ai-image" src="../assets/nishaSA/images.png" alt="Climate actions" style="grid-column: 1;">
                <img class="ai-image" src="../assets/nishaSA/UNDP-South-Sudan-2018-solar-panels-DSCF4902-1920x1073px-3.jpg" alt="Solar" style="grid-column: 2;">
              </div>

              <button class="ai-button" style="background: #3a969f; font-size: 25px;" data-go="Screen2">Next-</button>
              <p class="ai-label text-center" style="font-size: 19px; font-weight: 700;">&nbsp;APP CREATED BY- NISHA GARG</p>
            </section>

            <section class="screen-panel align-right" data-screen="Screen2" hidden>
              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/nishaSA/Sustainable_Development_Goal_13Climate.svg.png" alt="Goal 13">
                <img class="ai-image" src="../assets/nishaSA/school.png" alt="School">
              </div>

              <p class="ai-label font-sans" style="font-size: 30px; font-weight: 700; font-style: italic;">CAUSES and SOLUTION</p>

              <button class="ai-button" style="background: #5fc2cc; font-size: 25px;" data-speak="United Nations Sustainable Development Goal 13: Climate Action is needed because of the increasing problem of climate change caused mainly by human activities. The burning of fossil fuels for electricity, transport, and industries releases greenhouse gases like carbon dioxide, which trap heat in the atmosphere. Deforestation reduces the number of trees that absorb carbon dioxide, while agriculture and waste production release harmful gases such as methane. Overuse of natural resources and rapid industrial growth also increase pollution. These factors together lead to rising temperatures, extreme weather conditions, melting glaciers, and rising sea levels, making urgent climate action necessary.">CAUSES</button>

              <button class="ai-button" style="background: #5fc2cc; font-size: 25px;" data-speak="To achieve United Nations Sustainable Development Goal 13: Climate Action, several important solutions are needed. Countries should reduce the use of fossil fuels and shift to renewable energy sources like solar and wind power. Planting more trees and protecting forests can help absorb carbon dioxide from the air. Using public transport, saving electricity, and reducing waste can lower greenhouse gas emissions. Governments should also create strict environmental laws and spread awareness about climate change. By working together at local, national, and global levels, we can reduce pollution and protect our planet for future generations. ">SOLUTION</button>

              <div class="table" style="grid-template-columns: repeat(2, 1fr);">
                <img class="ai-image" src="../assets/nishaSA/2025_SDG_Goal-Level_Social_Media_Cards_Goal_13_small.png" alt="Goal 13 small">
                <img class="ai-image" src="../assets/nishaSA/SOLUTIONUN.jfif" alt="Solution">
              </div>

              <button class="ai-button" style="font-size: 25px; font-weight: 700;" data-go="Screen1">BACK-</button>
            </section>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../shared/app.js"></script>
</body>
</html>
